defaults:
  PAGE_DELAY_RANGE: [1.0, 3.0]
  FRESH_SESSION_PER_PAGE: false
  MAX_RATE_LIMIT_RETRIES: 3
  RATE_LIMIT_SLEEP_CAP: 300
  BLOCKED_BACKOFF_SECONDS: 0
  CONCURRENCY_LIMIT: 2
  FETCH_STRATEGY: aiohttp
  FETCH_TIMEOUT_SECONDS: 45
  BROWSER_WAIT_SELECTOR:
  BROWSER_BLOCK_SELECTORS: []

Amazon:
  PAGE_DELAY_RANGE: [4.0, 9.0]
  FRESH_SESSION_PER_PAGE: true
  BLOCKED_BACKOFF_SECONDS: 1800
  CONCURRENCY_LIMIT: 1

MercadoLibre:
  PAGE_DELAY_RANGE: [6.0, 12.0]
  BLOCKED_BACKOFF_SECONDS: 3600
  CONCURRENCY_LIMIT: 1
  FETCH_STRATEGY: browser
  FETCH_TIMEOUT_SECONDS: 30
  BROWSER_WAIT_SELECTOR: "section.ui-search-results"
  BROWSER_BLOCK_SELECTORS:
    - "url*=account-verification"
    - "body:has-text('Ingresa a tu cuenta')"
    - "body:has-text('suspicious-traffic')"
    - "body:has-text('account-verification')"

Liverpool:
  CONCURRENCY_LIMIT: 2

PalacioDeHierro:
  CONCURRENCY_LIMIT: 2
