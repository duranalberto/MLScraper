# Scraping Job Catalogue
# ──────────────────────
# Each entry requires a `provider` key that maps to a registered factory.
# All other keys are provider-specific and forwarded verbatim to the factory.
#
# Providers
# ─────────
#   ml  →  MercadoLibre
#   az  →  Amazon
#   lv  →  Liverpool
#   ph  →  Palacio de Hierro
#
# MercadoLibre categories (optional — default: consolas_videojuegos)
#   none | consolas | videojuegos | consolas_videojuegos | deportes_jersey
#   iphone_trece_pro_usado | iphone_once_pro_usado | iphone_se_usado | apple_official
#
# Amazon sellers (optional — default: none)
#   none | amazon_mx | amazon_usa | amazon_remates | buyspry
#
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ── MercadoLibre ──────────────────────────────────────────────────────────
  # - provider: ml
  #   search_term: fire emblem

  #- provider: ml
  #  search_term: zelda wii

  - provider: ml
    search_term: pokemon ds
    category: consolas

  - provider: ml
    search_term: nintendo 3ds
    category: consolas

  # - provider: ml
  #   search_term: nintendo ds
  #   category: consolas

  # - provider: ml
  #   search_term: nintendo switch
  #   category: consolas

  #- provider: ml
  #  search_term: lote nintendo

  #- provider: ml
  #  search_term: atlas
  #  category: deportes_jersey

  # - provider: ml
  #   search_term: game cube
  #   category: consolas

  # - provider: ml
  #   search_term: game cube juegos

  # ── Liverpool ─────────────────────────────────────────────────────────────
  # Generated Liverpool jobs always filter to Liverpool as seller.
  #
  # Global seller-filtered search:
  - provider: lv
    search_term: Ventilador Liverpool
    query: ventilador
  #
  # Page-only seller-filtered URL resolved from the documented catalogue:
  - provider: lv
    search_term: Hornos eléctricos
    page: hornos_electricos
  #
  # Page + query keeps both the Liverpool seller and page refinements:
  - provider: lv
    search_term: Hornos eléctricos Black
    page: Hornos eléctricos
    query: breville

  - provider: lv
    search_term: Apple
    page: Apple

  # Legacy `category` is accepted as an alias for `page`:
  - provider: lv
    search_term: Juegos Nintendo catálogo
    category: juegos_nintendo

  # ── Palacio de Hierro ──────────────────────────────────────────────────────
  - provider: ph
    search_term: Macbook
    url: "https://www.elpalaciodehierro.com/buscar?q=macbook"

  - provider: ph
    search_term: Apple
    url: "https://www.elpalaciodehierro.com/buscar?q=apple"

  # ── Amazon ────────────────────────────────────────────────────────────────
  - provider: az
    search_term: macbook
    seller: amazon_mx

  - provider: az
    search_term: mac studio
    seller: amazon_mx

  # Uncomment to activate:
  # - provider: az
  #   search_term: pokemon tcg
  #   seller: amazon_mx

  # - provider: az
  #   search_term: iphone
  #   seller: amazon_remates
