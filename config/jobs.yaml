# Scraping Job Catalogue
# ──────────────────────
# Each entry requires a `provider` key that maps to a registered factory and a
# provider-local `job_id`. Keep `job_id` stable for storage linkage and unique
# within that provider; provider-specific keys are forwarded to the factory.
#
# Providers
# ─────────
#   ml  →  MercadoLibre
#   az  →  Amazon
#   lv  →  Liverpool
#   ph  →  Palacio de Hierro
#
# MercadoLibre structured search fields (optional)
#   url: explicit URL bypass for unmodeled route shapes
#   query: global or seller-scoped search text for generated search routes
#   seller: apple | nintendo
#   category: computacion | celulares_telefonia | consolas_videojuegos
#             consolas | videojuegos
#   state: nuevo | usado
#
# Amazon structured search fields (optional)
#   url: explicit URL bypass for copied or unmodeled refinements
#   query: search text for generated search routes; seller-only jobs may omit it
#   seller: none | amazon_mx | amazon_usa | amazon_remates | buyspry
#           randu_mx | v_i_v_o | ugreen_group_limited
#   brand: apple | nintendo
#
# Liverpool structured search fields (optional)
#   url: explicit URL bypass for custom sellers or unmodeled filters
#   query: seller-filtered search text for generated search routes
#   page: documented page key or page label
#   category: legacy alias for page
#
# Palacio de Hierro structured search fields (optional)
#   url: explicit URL bypass for unmodeled route or filter shapes
#   query: global search text for generated search routes without a page
#   page: electronica | tablets | computo | laptops | electrodomesticos
#         linea_blanca | refrigeradores | videojuegos | nintendo | playstation
#   brands: page-scoped brand string or non-empty brand list
#
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ── MercadoLibre ──────────────────────────────────────────────────────────
  # - provider: ml
  #   job_id: fire emblem
  #   query: fire emblem

  # - provider: ml
