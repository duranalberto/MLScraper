  #   query: zelda wii

  # - provider: ml
  #  job_id: nintendo ds
  #  query: nintendo 3ds
  #  category: consolas
  #  state: usado

  # - provider: ml
  #   job_id: nintendo switch
  #   query: nintendo switch
  #   category: consolas

  # - provider: ml
  #   job_id: lote nintendo
  #   query: lote nintendo

  # - provider: ml
  #   job_id: game cube
  #   query: game cube
  #   category: consolas

  # - provider: ml
  #   job_id: game cube juegos
  #   query: game cube juegos

  # ── Liverpool ─────────────────────────────────────────────────────────────
  - provider: lv
    job_id: Ventilador Liverpool
    query: ventilador

  - provider: lv
    job_id: Hornos eléctricos
    page: hornos_electricos

  - provider: lv
    job_id: Hornos eléctricos Breville
    page: Hornos eléctricos
    query: breville

  - provider: lv
    job_id: Apple
    page: Apple

  - provider: lv
    job_id: Juegos Nintendo catálogo
    category: juegos_nintendo

  # ── Palacio de Hierro ──────────────────────────────────────────────────────
  - provider: ph
    job_id: Macbook
    query: macbook

  - provider: ph
    job_id: Apple
    query: apple

  - provider: ph
    job_id: Computadoras Apple
    page: computo
    brands:
      - apple

  - provider: ph
    job_id: Electrodomesticos
    page: electrodomesticos

  - provider: ph
    job_id: Linea Blanca
    page: linea_blanca

  - provider: ph
    job_id: Videojuegos
    page: videojuegos

  # ── Amazon ────────────────────────────────────────────────────────────────
  - provider: az
    job_id: macbook
    query: macbook
    seller: amazon_mx
    brand: apple

  - provider: az
    job_id: mac studio
    query: mac studio
    seller: amazon_mx
    brand: apple

  - provider: az
    job_id: Randu MX catalogue
    seller: randu_mx

  - provider: az
    job_id: V-I-V-O catalogue
    seller: v_i_v_o

  - provider: az
    job_id: UGREEN GROUP LIMITED catalogue
    seller: ugreen_group_limited
