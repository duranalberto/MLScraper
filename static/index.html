<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/x-icon" href="/ico/favicon.svg">
    <title>ML Scrapper</title>
  </head>

  <body>
    <header>
      <h1>ML Scrapper</h1>
      <div id="status">
        <div id="scrape-status"></div>
        <div id="new-element"></div>
      </div>
      <div class="input-group">
        <button  id="btn-interval">
          <svg id="btn-interval-start" xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="feather feather-play"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
          <svg id="btn-interval-pause" style="display:none" xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="feather feather-pause"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
        </button>
      </div>
    </header>
    <div id="parent-container"></div>
    <footer>Developed by Alberto</footer>
  </body>
</html>
<script src="script.js"></script>
