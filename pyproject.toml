[tool.black]
line-length = 100
target-version = ["py314"]

[tool.ruff]
line-length = 100
target-version = "py314"
extend-exclude = [
    "data",
    "venv",
    ".venv",
]

[tool.ruff.lint]
select = ["F"]

[tool.pyright]
pythonVersion = "3.14"
typeCheckingMode = "basic"
include = [
    "app.py",
    "shared",
    "scraper",
    "provider",
    "utils",
    "tests",
]
exclude = [
    "**/__pycache__",
    ".cache",
    ".pytest_cache",
    ".ruff_cache",
    ".venv",
    "data",
    "venv",
]
reportMissingTypeStubs = false
